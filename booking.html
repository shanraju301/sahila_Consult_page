<style>
  :root {
    --teal: #1f8b80;
    --teal-dark: #15605a;
    --rust: #C17A5A;
    --rust-light: #dba089;
    --cream: #faf4ee;
    --dark: #1a2e2c;
    --white: #ffffff;
    --line: rgba(26,46,42,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--dark);
    background: var(--cream);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { font-family: 'Fraunces', serif; font-weight: 600; line-height: 1.12; letter-spacing: -0.01em; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 0 28px; }

  /* Top bar */
  .topbar {
    background: var(--dark); color: var(--cream); font-size: 13px; font-weight: 500;
    text-align: center; padding: 10px 16px; letter-spacing: 0.03em;
  }
  .topbar span { color: var(--rust-light); font-weight: 700; }

  /* Header */
  .page-header {
    background: var(--cream);
    padding: 20px 28px 16px;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--teal);
    text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .back-link:hover { color: var(--teal-dark); }
  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--rust); margin-bottom: 14px;
  }
  .page-header h1 {
    font-size: clamp(22px, 4vw, 34px);
    color: var(--dark);
    margin-bottom: 0;
  }
  .page-header h1 em { font-style: italic; color: var(--teal); }

  /* Divider */
  .divider { display: none; }

  /* Calendar section */
  .calendar-section {
    padding: 20px 0 40px;
  }
  .calendar-card {
    background: var(--white);
    border-radius: 20px;
    box-shadow: 0 20px 60px -20px rgba(26,46,42,0.15);
    overflow: hidden;
    padding: 8px;
    position: relative;
  }
  .calendar-card iframe {
    width: 1px;
    min-width: 100%;
    border: none;
    min-height: 750px;
    display: block;
  }

  /* Loading state */
  .calendar-loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--white);
    border-radius: 20px;
    gap: 14px;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .calendar-loading.hidden { opacity: 0; }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(31,139,128,0.2);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { font-size: 13px; color: rgba(26,46,42,0.5); font-weight: 500; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .calendar-card iframe { min-height: 900px; }
  }

  /* Trust bar */
  .trust-bar {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 16px;
    margin-top: 20px; padding: 16px 0;
    border-top: 1px solid var(--line);
  }
  .trust-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; color: var(--dark); opacity: 0.7;
  }
  .trust-icon { font-size: 18px; }

  /* Footer */
  footer {
    background: var(--dark); color: rgba(255,255,255,0.55);
    text-align: center; padding: 28px 16px; font-size: 13px;
  }
  footer a { color: var(--rust-light); text-decoration: none; }

  @media (max-width: 600px) {
    .page-header { padding: 14px 16px 12px; }
    .calendar-card { border-radius: 12px; padding: 2px; }
    .calendar-section { padding: 14px 0 24px; }
    .trust-bar { gap: 12px; margin-top: 14px; padding: 12px 0; }
    .trust-item { font-size: 12px; }
  }
</style>
